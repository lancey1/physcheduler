name: Build Application

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller openpyxl ortools
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name PhysicianScheduler scheduler.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhysicianScheduler-macOS
        path: dist/PhysicianScheduler

  build-windows:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pyinstaller openpyxl ortools
    
    - name: Build with PyInstaller
      run: |
        pyinstaller --onefile --windowed --name PhysicianScheduler scheduler.py
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: PhysicianScheduler-Windows
        path: dist/PhysicianScheduler.exe